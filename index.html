<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZamWboys</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g0: #030806;
      --g1: #071009;
      --g2: #0b180d;
      --g3: #122016;
      --border: #1a3020;
      --a:  #00d97e;
      --a2: #00b8d4;
      --text: #c8e8d0;
      --sub:  #5a8a68;
      --del:  #e05050;
      --r: 12px;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--g0); color: var(--text); }

    /* ── MAP ────────────────────────────────────────────── */
    #map {
      position: fixed; inset: 0; z-index: 0;
      /* Shift tiles to a moody teal-green */
      filter: hue-rotate(108deg) saturate(0.42) brightness(0.72) contrast(1.05);
    }

    /* ── PANEL ──────────────────────────────────────────── */
    #panel {
      position: fixed; top: 20px; left: 20px; bottom: 20px;
      width: 300px; z-index: 100;
      display: flex; flex-direction: column; gap: 0;
      border-radius: var(--r);
      background: rgba(7,16,9,0.88);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px) saturate(1.4);
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    #ph {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #ph-top { display: flex; align-items: center; justify-content: space-between; }
    #ph-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; color: var(--text); }
    #ph-title span { color: var(--a); }
    #sync-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--sub);
      transition: background .4s;
    }
    #sync-dot.live { background: var(--a); box-shadow: 0 0 6px var(--a); }
    #ph-trip {
      margin-top: 8px; display: flex; align-items: center; gap: 7px;
      font-size: 11px; color: var(--sub);
    }
    #trip-code {
      font-family: 'Courier New', monospace; font-size: 11px;
      color: var(--a2); letter-spacing: 1.5px;
      background: rgba(0,184,212,0.08); border: 1px solid rgba(0,184,212,0.2);
      border-radius: 4px; padding: 2px 7px;
    }

    /* ── SEARCH ─────────────────────────────────────────── */
    #search-wrap {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }
    #search-row { display: flex; align-items: center; gap: 8px; position: relative; }
    #search-input {
      flex: 1; background: var(--g3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit;
      font-size: 13px; padding: 9px 36px 9px 12px;
      outline: none; transition: border-color .2s;
    }
    #search-input:focus { border-color: var(--a); }
    #search-input::placeholder { color: var(--sub); }
    #search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--sub); cursor: pointer;
      font-size: 15px; line-height: 1; padding: 3px; display: none;
      transition: color .15s;
    }
    #search-clear:hover { color: var(--text); }
    #search-clear.vis { display: block; }

    /* spinner */
    #spin {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--a);
      animation: spin .6s linear infinite; display: none; flex-shrink: 0;
    }
    #spin.vis { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DROPDOWN ───────────────────────────────────────── */
    #dropdown {
      position: absolute; left: 14px; right: 14px; top: calc(100% - 4px);
      background: var(--g1); border: 1px solid var(--border);
      border-radius: 10px; z-index: 200; overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.7);
      opacity: 0; transform: translateY(-6px);
      pointer-events: none; transition: opacity .18s, transform .18s;
    }
    #dropdown.open { opacity: 1; transform: translateY(0); pointer-events: all; }
    .dr-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 13px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background .12s;
    }
    .dr-item:last-child { border-bottom: none; }
    .dr-item:hover, .dr-item.active { background: var(--g3); }
    .dr-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
    .dr-text { flex: 1; min-width: 0; }
    .dr-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dr-sub  { font-size: 11px; color: var(--sub); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dr-msg  { padding: 14px 13px; font-size: 12px; color: var(--sub); text-align: center; }

    /* ── ROUTE LIST ─────────────────────────────────────── */
    #route-wrap { flex: 1; overflow-y: auto; padding: 12px; }
    #route-wrap::-webkit-scrollbar { width: 3px; }
    #route-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #stop-list { display: flex; flex-direction: column; gap: 4px; }

    .sc {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; border-radius: 8px;
      background: var(--g2); border: 1px solid transparent;
      cursor: grab; transition: border-color .15s, background .15s;
      user-select: none;
    }
    .sc:hover { border-color: var(--border); background: var(--g3); }
    .sc.sortable-ghost { opacity: 0.25; }
    .sc.sortable-chosen { border-color: var(--a); background: rgba(0,217,126,0.06); }

    .sc-num {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0;
      border: 1.5px solid currentColor;
    }
    .sc-info { flex: 1; min-width: 0; }
    .sc-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sc-dist { font-size: 10px; color: var(--sub); margin-top: 1px; }
    .sc-del {
      background: none; border: none; color: transparent;
      cursor: pointer; font-size: 14px; padding: 2px 4px;
      border-radius: 4px; transition: color .15s; flex-shrink: 0;
    }
    .sc:hover .sc-del { color: var(--sub); }
    .sc-del:hover { color: var(--del) !important; }

    /* connect line between cards */
    .sc-line {
      width: 1px; height: 6px; background: var(--border);
      margin: 0 0 0 21px; flex-shrink: 0;
    }

    #empty {
      padding: 28px 12px; text-align: center;
      color: var(--sub); font-size: 12px; line-height: 1.6;
    }
    #empty-icon { font-size: 28px; display: block; margin-bottom: 8px; }

    /* route stats */
    #stats {
      padding: 8px 12px 4px;
      font-size: 11px; color: var(--sub);
      text-align: center; border-top: 1px solid var(--border);
    }
    #stats b { color: var(--a); font-weight: 500; }

    /* ── FOOTER ─────────────────────────────────────────── */
    #footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .btn {
      flex: 1; padding: 8px 6px;
      border-radius: 7px; border: 1px solid var(--border);
      background: var(--g2); color: var(--sub);
      font-family: inherit; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all .15s; letter-spacing: 0.2px;
    }
    .btn:hover { border-color: var(--a); color: var(--a); background: rgba(0,217,126,0.07); }
    .btn.danger:hover { border-color: var(--del); color: var(--del); background: rgba(224,80,80,0.07); }

    /* ── MAP marker override ────────────────────────────── */
    .pin-wrap {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    /* ── Leaflet overrides ──────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: var(--g1) !important; color: var(--text) !important;
      border: 1px solid var(--border) !important; border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
      font-family: 'Inter', sans-serif !important; font-size: 12px !important;
    }
    .leaflet-popup-tip { background: var(--g1) !important; }
    .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 8px !important; overflow: hidden; }
    .leaflet-control-zoom a { background: rgba(7,16,9,0.9) !important; color: var(--sub) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { color: var(--a) !important; }
    .leaflet-control-attribution { background: rgba(3,8,6,0.6) !important; color: var(--sub) !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: var(--sub) !important; }

    /* ── Toast ──────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--g2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 9px 18px; font-size: 12px; z-index: 9999;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.6); white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok  { border-color: rgba(0,217,126,0.4); color: var(--a); }
    #toast.err { border-color: rgba(224,80,80,0.4); color: var(--del); }

    /* ── PRINT ──────────────────────────────────────────── */
    @media print {
      #panel, #toast { display: none !important; }
      #map { filter: none !important; }
    }

    /* ── Slide-in animation for new stop cards ───────────── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .sc.new { animation: slideIn .25s ease; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <!-- Header -->
  <div id="ph">
    <div id="ph-top">
      <div id="ph-title">Zam<span>W</span>boys</div>
      <div id="sync-dot" title="Sync status"></div>
    </div>
    <div id="ph-trip">
      <span>trip</span>
      <span id="trip-code">—</span>
    </div>
  </div>

  <!-- Search -->
  <div id="search-wrap">
    <div id="search-row">
      <input id="search-input" type="text" placeholder="Search anywhere in the world…" autocomplete="off" spellcheck="false" />
      <div id="spin"></div>
      <button id="search-clear">×</button>
    </div>
    <div id="dropdown"></div>
  </div>

  <!-- Route -->
  <div id="route-wrap">
    <div id="stop-list"></div>
    <div id="empty">
      <span id="empty-icon">🌍</span>
      Search for a place above, or<br>double-click anywhere on the map.
    </div>
  </div>

  <div id="stats" style="display:none"></div>

  <!-- Footer -->
  <div id="footer">
    <button class="btn" id="btn-share">↗ Share</button>
    <button class="btn" id="btn-export">↓ Export</button>
    <button class="btn danger" id="btn-clear">✕</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
//  FIREBASE CONFIG — paste your project config here.
//  Leave as-is to run in local mode (no live collaboration).
// ══════════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCJ2KcYfBuFeJuBuYGEVC_r6WQwtCJjh4Y",
  authDomain:        "zamzam-acdf9.firebaseapp.com",
  databaseURL:       "https://zamzam-acdf9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "zamzam-acdf9",
  storageBucket:     "zamzam-acdf9.firebasestorage.app",
  messagingSenderId: "1085071664405",
  appId:             "1:1085071664405:web:972b1cd8981ee19c46751c",
  measurementId:     "G-4KPGXXF2HG"
};
// ══════════════════════════════════════════════════════════════════════

// ── State ──────────────────────────────────────────────────────────────
let stops = [], markers = [], polyline = null;
let db = null, stopsRef = null;
let firebaseActive = false;
let tripId = '';
let searchTimer = null, activeIdx = -1, lastResults = [];

// ── Palette ────────────────────────────────────────────────────────────
const PALETTE = ['#00d97e','#00b8d4','#00e5b8','#4adb9a','#00a8ff',
                 '#33d6a0','#00cfb4','#1ae88a','#00c9e0','#50e0b0'];

// ── Trip ID ────────────────────────────────────────────────────────────
function initTripId() {
  let id = window.location.hash.replace('#','').trim();
  if (!id || id.length < 4) { id = Math.random().toString(36).slice(2,9); window.location.hash = id; }
  tripId = id;
  document.getElementById('trip-code').textContent = id.toUpperCase();
}

// ── Firebase ────────────────────────────────────────────────────────────
function initFirebase() {
  if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    stopsRef = db.ref(`/trips/${tripId}/stops`);
    stopsRef.on('value', snap => {
      const data = snap.val() || {};
      stops = Object.entries(data).map(([id,v]) => ({id,...v})).sort((a,b)=>(a.order??0)-(b.order??0));
      render();
    });
    firebaseActive = true;
    document.getElementById('sync-dot').classList.add('live');
  } catch(e) { console.warn('Firebase:', e); loadLocal(); }
}

// ── Local storage ──────────────────────────────────────────────────────
function loadLocal() {
  try { const r = localStorage.getItem(`zwb_${tripId}`); if(r) stops = JSON.parse(r); } catch{}
  render();
}
function saveLocal() {
  localStorage.setItem(`zwb_${tripId}`, JSON.stringify(stops));
}

// ── CRUD ───────────────────────────────────────────────────────────────
function addStop(name, lat, lng) {
  const d = {name, lat, lng, order: stops.length};
  if (firebaseActive) { stopsRef.push(d); }
  else { stops.push({id: Date.now().toString(), ...d}); saveLocal(); render(); }
}
function removeStop(id) {
  if (firebaseActive) { stopsRef.child(id).remove(); }
  else { stops = stops.filter(s=>s.id!==id); stops.forEach((s,i)=>s.order=i); saveLocal(); render(); }
}
function saveOrder() {
  if (firebaseActive) { stops.forEach((s,i) => stopsRef.child(s.id).update({order:i})); }
  else { stops.forEach((s,i)=>s.order=i); saveLocal(); }
}
function clearAll() {
  if (!confirm('Clear the whole route?')) return;
  if (firebaseActive) { stopsRef.remove(); }
  else { stops=[]; saveLocal(); render(); }
}

// ── Map ────────────────────────────────────────────────────────────────
const map = L.map('map', {center:[10,25], zoom:3, minZoom:2, maxZoom:16, zoomControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap · © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

// ── Render ─────────────────────────────────────────────────────────────
function haversine(a, b) {
  const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function pinIcon(i) {
  const c = PALETTE[i % PALETTE.length];
  return L.divIcon({
    className: '',
    html: `<div class="pin-wrap" style="background:${c}22;border:2px solid ${c};color:${c}">${i+1}</div>`,
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-16]
  });
}

function render() {
  renderMap();
  renderList();
  renderStats();
}

function renderMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (polyline) { map.removeLayer(polyline); polyline = null; }
  if (!stops.length) return;

  const coords = stops.map(s=>[s.lat,s.lng]);

  polyline = L.polyline(coords, {
    color: '#00d97e', weight: 2, opacity: 0.7, dashArray: '6 5'
  }).addTo(map);

  // Direction arrows at midpoints
  for (let i=0; i<stops.length-1; i++) {
    const a=stops[i], b=stops[i+1];
    const angle = Math.atan2(b.lat-a.lat, b.lng-a.lng)*180/Math.PI;
    const mid = [(a.lat+b.lat)/2, (a.lng+b.lng)/2];
    markers.push(L.marker(mid, {
      icon: L.divIcon({
        className:'',
        html:`<div style="color:#00d97e;font-size:10px;opacity:.6;transform:rotate(${-angle+90}deg)">▲</div>`,
        iconSize:[10,10], iconAnchor:[5,5]
      }), interactive:false
    }).addTo(map));
  }

  stops.forEach((s,i) => {
    const dist = i>0 ? ` · ${haversine(stops[i-1],s).toLocaleString()} km` : ' · start';
    const m = L.marker([s.lat,s.lng], {icon:pinIcon(i)})
      .addTo(map)
      .bindPopup(`<b>${i+1}. ${s.name}</b><br><small style="color:var(--sub)">${dist.slice(3)}</small>`);
    markers.push(m);
  });

  if (stops.length>1) map.fitBounds(polyline.getBounds(), {padding:[60,60]});
  else map.setView([stops[0].lat, stops[0].lng], 7, {animate:true});
}

function renderList() {
  const list = document.getElementById('stop-list');
  const empty = document.getElementById('empty');

  if (!stops.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  let html = '';
  stops.forEach((s,i) => {
    const c = PALETTE[i%PALETTE.length];
    const dist = i>0 ? `${haversine(stops[i-1],s).toLocaleString()} km` : 'start';
    if (i>0) html += `<div class="sc-line"></div>`;
    html += `
      <div class="sc" data-id="${s.id}">
        <div class="sc-num" style="color:${c};border-color:${c}">${i+1}</div>
        <div class="sc-info">
          <div class="sc-name" title="${s.name}">${s.name}</div>
          <div class="sc-dist">${dist}</div>
        </div>
        <button class="sc-del" data-id="${s.id}">×</button>
      </div>`;
  });
  list.innerHTML = html;

  list.querySelectorAll('.sc-del').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); removeStop(b.dataset.id);
  }));
  list.querySelectorAll('.sc').forEach((card,i) => card.addEventListener('click', e => {
    if (e.target.classList.contains('sc-del')) return;
    map.setView([stops[i].lat, stops[i].lng], 8, {animate:true});
  }));

  if (window._sort) window._sort.destroy();
  window._sort = Sortable.create(list, {
    animation:120, ghostClass:'sortable-ghost', chosenClass:'sortable-chosen',
    filter:'.sc-del, .sc-line', draggable:'.sc',
    onEnd(e) {
      // Re-map to stops array positions (accounting for .sc-line dividers)
      const cards = [...list.querySelectorAll('.sc')];
      const reordered = cards.map(c => stops.find(s=>s.id===c.dataset.id)).filter(Boolean);
      stops = reordered;
      saveOrder(); renderMap(); renderList(); renderStats();
    }
  });
}

function renderStats() {
  const el = document.getElementById('stats');
  if (stops.length < 2) { el.style.display='none'; return; }
  let total = 0;
  for (let i=1;i<stops.length;i++) total += haversine(stops[i-1],stops[i]);
  el.style.display = 'block';
  el.innerHTML = `<b>${stops.length}</b> stops · <b>~${total.toLocaleString()} km</b> total`;
}

// ── Search ─────────────────────────────────────────────────────────────
const inp  = document.getElementById('search-input');
const dd   = document.getElementById('dropdown');
const spin = document.getElementById('spin');
const clr  = document.getElementById('search-clear');

inp.addEventListener('input', () => {
  const q = inp.value.trim();
  clr.classList.toggle('vis', q.length>0);
  clearTimeout(searchTimer);
  if (!q) { closeDD(); return; }
  searchTimer = setTimeout(() => search(q), 320);
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDD(); inp.blur(); return; }
  if (e.key === 'Enter') {
    if (activeIdx >= 0 && lastResults[activeIdx]) { pick(lastResults[activeIdx]); return; }
    clearTimeout(searchTimer); search(inp.value.trim());
    return;
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); setActive(activeIdx+1); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); setActive(activeIdx-1); }
});

clr.addEventListener('click', () => { inp.value=''; clr.classList.remove('vis'); closeDD(); inp.focus(); });

function setActive(idx) {
  const items = dd.querySelectorAll('.dr-item');
  activeIdx = Math.max(-1, Math.min(idx, items.length-1));
  items.forEach((el,i) => el.classList.toggle('active', i===activeIdx));
}

function closeDD() { dd.classList.remove('open'); activeIdx=-1; lastResults=[]; }

function countryFlag(cc) {
  if (!cc || cc.length!==2) return '📍';
  return cc.toUpperCase().replace(/./g, c => String.fromCodePoint(c.charCodeAt(0)+127397));
}

function placeTypeIcon(type, cls) {
  const map2 = {city:'🏙',town:'🏘',village:'🌿',hamlet:'🌿',suburb:'🏘',
    island:'🏝',mountain:'⛰',peak:'⛰',river:'🌊',lake:'🏞',
    country:'🌍',region:'📍',park:'🌿',airport:'✈',station:'🚉'};
  return map2[type] || map2[cls] || '📍';
}

async function search(q) {
  if (!q) return;
  spin.classList.add('vis');
  dd.innerHTML = ''; dd.classList.add('open'); activeIdx=-1;
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`;
    const data = await (await fetch(url, {headers:{'Accept-Language':'en'}})).json();
    spin.classList.remove('vis');
    lastResults = data;
    if (!data.length) { dd.innerHTML='<div class="dr-msg">No results.</div>'; return; }
    dd.innerHTML = data.map((p,i) => {
      const name = p.display_name.split(',')[0];
      const country = p.address?.country || '';
      const cc = p.address?.country_code?.toUpperCase() || '';
      const icon = placeTypeIcon(p.type, p.class);
      const sub = [p.address?.state||p.address?.county||'', country].filter(Boolean).join(', ');
      return `<div class="dr-item" data-i="${i}">
        <div class="dr-icon">${icon}</div>
        <div class="dr-text">
          <div class="dr-name">${name}</div>
          ${sub ? `<div class="dr-sub">${sub}</div>` : ''}
        </div>
        ${cc ? `<div style="font-size:18px">${countryFlag(cc.toLowerCase())}</div>` : ''}
      </div>`;
    }).join('');
    dd.querySelectorAll('.dr-item').forEach(el => {
      el.addEventListener('mouseenter', () => setActive(+el.dataset.i));
      el.addEventListener('click', () => pick(data[+el.dataset.i]));
    });
  } catch { spin.classList.remove('vis'); dd.innerHTML='<div class="dr-msg">Search failed.</div>'; }
}

function pick(p) {
  const name = p.display_name.split(',')[0];
  const lat = parseFloat(p.lat), lng = parseFloat(p.lon);
  addStop(name, lat, lng);
  inp.value=''; clr.classList.remove('vis'); closeDD();
  toast(`Added: ${name}`, 'ok');
}

// ── Double-click to add ────────────────────────────────────────────────
map.on('dblclick', async e => {
  const {lat,lng} = e.latlng;
  try {
    const data = await (await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{'Accept-Language':'en'}})).json();
    const name = data.address?.city||data.address?.town||data.address?.village||data.address?.county||data.display_name?.split(',')[0]||`${lat.toFixed(3)},${lng.toFixed(3)}`;
    addStop(name,lat,lng); toast(`Added: ${name}`,'ok');
  } catch { const n=`${lat.toFixed(3)}, ${lng.toFixed(3)}`; addStop(n,lat,lng); toast(`Added: ${n}`,'ok'); }
});

// Close dropdown on outside click
document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target)) closeDD();
});

// ── Buttons ────────────────────────────────────────────────────────────
document.getElementById('btn-share').addEventListener('click', () => {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => toast('Link copied!','ok')).catch(() => prompt('Share this link:', url));
});
document.getElementById('btn-export').addEventListener('click', () => {
  toast('Tip: in the print dialog, choose "Save as PDF"','ok');
  setTimeout(()=>window.print(), 700);
});
document.getElementById('btn-clear').addEventListener('click', clearAll);

// ── Toast ──────────────────────────────────────────────────────────────
let _tt;
function toast(msg, type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='',2800);
}

// ── Boot ───────────────────────────────────────────────────────────────
initTripId();
initFirebase();
if (!firebaseActive) loadLocal();
</script>
</body>
