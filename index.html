<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZamWboys — Trip Planner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c18;
      --sidebar:   #0d1224;
      --card:      #131929;
      --border:    #1e2740;
      --accent:    #f0a020;
      --accent2:   #e05a1a;
      --text:      #d8deee;
      --muted:     #6b7594;
      --danger:    #c0392b;
      --success:   #27ae60;
      --line:      #f0a020;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ─────────────────────────────────────── */
    #app { display: flex; height: 100vh; }
    #sidebar { width: 340px; min-width: 340px; display: flex; flex-direction: column; background: var(--sidebar); border-right: 1px solid var(--border); z-index: 1000; overflow: hidden; }
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── Header ─────────────────────────────────────── */
    #header {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, #0a0f1e 0%, #12203a 100%);
      border-bottom: 1px solid var(--border);
    }
    #header h1 {
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    #header h1 span { font-weight: 300; opacity: 0.7; font-size: 14px; display: block; margin-top: 2px; }
    #trip-info {
      margin-top: 12px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--muted);
    }
    #trip-code {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px;
      font-family: monospace; font-size: 12px; color: var(--accent);
      letter-spacing: 1px;
    }

    /* ── Search ─────────────────────────────────────── */
    #search-section { padding: 16px 16px 0; }
    #search-wrap { position: relative; }
    #search-input {
      width: 100%; padding: 11px 44px 11px 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: border-color .2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }
    #search-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 18px; padding: 4px; transition: color .2s;
    }
    #search-btn:hover { color: var(--accent); }

    #search-results {
      margin-top: 6px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      display: none;
    }
    #search-results.open { display: block; }
    .result-item {
      padding: 10px 14px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid var(--border); transition: background .15s;
      display: flex; flex-direction: column; gap: 2px;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: var(--border); }
    .result-item .r-name { font-weight: 500; }
    .result-item .r-sub  { color: var(--muted); font-size: 11px; }
    #search-loading { padding: 12px 14px; font-size: 13px; color: var(--muted); text-align: center; }

    /* ── Route list ─────────────────────────────────── */
    #route-section { flex: 1; overflow-y: auto; padding: 16px; }
    #route-section::-webkit-scrollbar { width: 4px; }
    #route-section::-webkit-scrollbar-track { background: transparent; }
    #route-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #route-label {
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    #stop-list { display: flex; flex-direction: column; gap: 6px; }

    .stop-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      cursor: grab; transition: border-color .2s, transform .15s;
      user-select: none;
    }
    .stop-card:hover { border-color: #2a3550; }
    .stop-card.sortable-ghost { opacity: 0.3; transform: scale(0.97); }
    .stop-card.sortable-chosen { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(240,160,32,0.15); }

    .stop-num {
      min-width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .stop-info { flex: 1; min-width: 0; }
    .stop-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-dist { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .stop-del {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 2px 4px;
      border-radius: 4px; transition: color .2s, background .2s; flex-shrink: 0;
    }
    .stop-del:hover { color: var(--danger); background: rgba(192,57,43,0.1); }

    #empty-msg {
      text-align: center; color: var(--muted); font-size: 13px;
      padding: 32px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    #empty-msg .big-icon { font-size: 36px; }

    /* ── Footer buttons ──────────────────────────────── */
    #footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .btn {
      flex: 1; padding: 10px 8px; border-radius: 8px; border: none;
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .2s; letter-spacing: 0.3px;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: var(--card); border: 1px solid var(--border); color: var(--muted); }
    .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Firebase badge ──────────────────────────────── */
    #sync-badge {
      position: absolute; top: 12px; right: 12px; z-index: 1001;
      padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
      display: flex; align-items: center; gap: 5px;
      backdrop-filter: blur(8px);
    }
    #sync-badge.live { background: rgba(39,174,96,0.2); color: #27ae60; border: 1px solid rgba(39,174,96,0.4); }
    #sync-badge.local { background: rgba(240,160,32,0.2); color: var(--accent); border: 1px solid rgba(240,160,32,0.4); }
    #sync-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 20px; font-size: 13px; z-index: 9999;
      transition: transform .3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok { border-color: var(--success); color: var(--success); }
    #toast.err { border-color: var(--danger); color: #e74c3c; }

    /* ── Custom map markers ──────────────────────────── */
    .map-pin {
      width: 32px; height: 32px; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.2);
    }
    .map-pin span {
      transform: rotate(45deg);
      font-size: 12px; font-weight: 800; color: #000;
      font-family: 'Space Grotesk', sans-serif;
    }
    .map-popup { font-family: 'Space Grotesk', sans-serif; font-size: 13px; }
    .map-popup b { display: block; margin-bottom: 3px; }
    .map-popup small { color: #888; }

    /* ── Leaflet overrides ───────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .leaflet-popup-tip { background: var(--card); }
    .leaflet-control-zoom { border: 1px solid var(--border) !important; }
    .leaflet-control-zoom a { background: var(--card) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--border) !important; }
    .leaflet-control-attribution { background: rgba(13,18,36,0.8) !important; color: var(--muted) !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: var(--muted) !important; }

    /* ── Print mode ──────────────────────────────────── */
    @media print {
      #sidebar, #sync-badge { display: none !important; }
      #map-wrap { width: 100vw !important; }
      #map { height: 100vh !important; }
      body { overflow: visible !important; }
    }

    /* ── Animated route line ─────────────────────────── */
    @keyframes dash { to { stroke-dashoffset: -20; } }
  </style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="header">
      <h1>ZamWboys<span>Africa &amp; Europe Trip Planner</span></h1>
      <div id="trip-info">
        <span>Trip code:</span>
        <span id="trip-code">—</span>
        <span id="trip-mode-badge"></span>
      </div>
    </div>

    <div id="search-section">
      <div id="search-wrap">
        <input id="search-input" type="text" placeholder="Search for a city or place…" autocomplete="off" />
        <button id="search-btn" title="Search">⌕</button>
      </div>
      <div id="search-results"></div>
    </div>

    <div id="route-section">
      <div id="route-label">Route</div>
      <div id="stop-list"></div>
      <div id="empty-msg">
        <span class="big-icon">🌍</span>
        <span>Search for a place and add it to start building your route.</span>
      </div>
    </div>

    <div id="footer">
      <button class="btn btn-primary" id="btn-share">⤷ Share</button>
      <button class="btn btn-ghost"   id="btn-export">⬇ Export</button>
      <button class="btn btn-danger"  id="btn-clear">✕ Clear</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map-wrap">
    <div id="map"></div>
    <div id="sync-badge" class="local"><div class="dot"></div><span id="sync-label">Local mode</span></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
//  FIREBASE CONFIG
//  Fill in your Firebase project credentials below.
//  Get them from: Firebase Console → Project Settings → Your apps → Web
//  Leave as-is to use local-only mode (no collaboration).
// ══════════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
// ══════════════════════════════════════════════════════════════════════

// ── State ──────────────────────────────────────────────────────────────
let stops   = [];   // [{ id, name, lat, lng, order }]
let markers = [];
let polyline = null;
let arrowLayer = null;
let db = null;
let stopsRef = null;
let tripId = '';
let firebaseActive = false;
let searchDebounce = null;

// ── Colour palette for numbered stops ─────────────────────────────────
const STOP_COLORS = [
  '#f0a020','#e05a1a','#c0392b','#8e44ad','#2980b9',
  '#16a085','#27ae60','#d35400','#7f8c8d','#f39c12'
];

// ── Trip ID via URL hash ───────────────────────────────────────────────
function initTripId() {
  let id = window.location.hash.replace('#','').trim();
  if (!id || id.length < 4) {
    id = Math.random().toString(36).slice(2, 9);
    window.location.hash = id;
  }
  tripId = id;
  document.getElementById('trip-code').textContent = id.toUpperCase();
}

// ── Firebase init ──────────────────────────────────────────────────────
function initFirebase() {
  if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return; // skip if unconfigured
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    stopsRef = db.ref(`/trips/${tripId}/stops`);

    stopsRef.on('value', snapshot => {
      const data = snapshot.val() || {};
      stops = Object.entries(data)
        .map(([id, v]) => ({ id, ...v }))
        .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      render();
    });

    firebaseActive = true;
    document.getElementById('sync-badge').className = 'live';
    document.getElementById('sync-label').textContent = 'Live sync';
  } catch (e) {
    console.warn('Firebase init failed:', e);
    loadLocal();
  }
}

// ── Local storage fallback ─────────────────────────────────────────────
function loadLocal() {
  try {
    const raw = localStorage.getItem(`zamwboys_${tripId}`);
    if (raw) stops = JSON.parse(raw);
  } catch {}
  render();
}

function saveLocal() {
  localStorage.setItem(`zamwboys_${tripId}`, JSON.stringify(stops));
}

// ── Stop CRUD ──────────────────────────────────────────────────────────
function addStop(name, lat, lng) {
  const stopData = { name, lat, lng, order: stops.length };
  if (firebaseActive) {
    stopsRef.push(stopData);
  } else {
    stops.push({ id: Date.now().toString(), ...stopData });
    saveLocal();
    render();
  }
}

function removeStop(id) {
  if (firebaseActive) {
    stopsRef.child(id).remove();
  } else {
    stops = stops.filter(s => s.id !== id);
    stops.forEach((s, i) => s.order = i);
    saveLocal();
    render();
  }
}

function saveOrder() {
  if (firebaseActive) {
    stops.forEach((s, i) => stopsRef.child(s.id).update({ order: i }));
  } else {
    stops.forEach((s, i) => s.order = i);
    saveLocal();
  }
}

function clearAll() {
  if (!confirm('Clear the entire route? This cannot be undone.')) return;
  if (firebaseActive) {
    stopsRef.remove();
  } else {
    stops = [];
    saveLocal();
    render();
  }
}

// ── Map setup ──────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [18, 20],
  zoom: 4,
  minZoom: 2,
  maxZoom: 16,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Soft bounds over Europe + Africa
const BOUNDS = L.latLngBounds(L.latLng(-40, -25), L.latLng(72, 65));
map.setMaxBounds(BOUNDS.pad(0.3));

// ── Render markers & polyline ──────────────────────────────────────────
function colorForIndex(i) {
  return STOP_COLORS[i % STOP_COLORS.length];
}

function makeIcon(index) {
  const color = colorForIndex(index);
  return L.divIcon({
    className: '',
    html: `<div class="map-pin" style="background:${color};transform:rotate(-45deg)"><span>${index + 1}</span></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -34]
  });
}

function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 +
    Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) * Math.sin(dLng/2)**2;
  return (2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1-x))).toFixed(0);
}

function render() {
  renderSidebar();
  renderMap();
}

function renderMap() {
  // Clear old markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (polyline) { map.removeLayer(polyline); polyline = null; }
  if (arrowLayer) { map.removeLayer(arrowLayer); arrowLayer = null; }

  if (!stops.length) return;

  const coords = stops.map(s => [s.lat, s.lng]);

  // Polyline
  polyline = L.polyline(coords, {
    color: '#f0a020',
    weight: 2.5,
    opacity: 0.85,
    dashArray: '8 6',
    lineJoin: 'round'
  }).addTo(map);

  // Arrow decorators (simple midpoint arrows using rotated divicons)
  for (let i = 0; i < stops.length - 1; i++) {
    const a = stops[i], b = stops[i+1];
    const midLat = (a.lat + b.lat) / 2;
    const midLng = (a.lng + b.lng) / 2;
    const angle = Math.atan2(b.lat - a.lat, b.lng - a.lng) * 180 / Math.PI;
    const arrowIcon = L.divIcon({
      className: '',
      html: `<div style="transform:rotate(${-angle}deg);color:#f0a020;font-size:14px;line-height:1;">▶</div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });
    const am = L.marker([midLat, midLng], { icon: arrowIcon, interactive: false }).addTo(map);
    markers.push(am);
  }

  // Stop markers
  stops.forEach((stop, i) => {
    const m = L.marker([stop.lat, stop.lng], { icon: makeIcon(i) })
      .addTo(map)
      .bindPopup(`
        <div class="map-popup">
          <b>${i + 1}. ${stop.name}</b>
          ${i > 0 ? `<small>${haversineKm(stops[i-1], stop)} km from previous stop</small>` : '<small>Starting point</small>'}
        </div>
      `);
    markers.push(m);
  });

  // Fit map to route
  if (stops.length > 1) {
    map.fitBounds(polyline.getBounds(), { padding: [60, 60] });
  } else if (stops.length === 1) {
    map.setView([stops[0].lat, stops[0].lng], 7);
  }
}

function renderSidebar() {
  const list = document.getElementById('stop-list');
  const emptyMsg = document.getElementById('empty-msg');

  if (!stops.length) {
    list.innerHTML = '';
    emptyMsg.style.display = 'flex';
    return;
  }
  emptyMsg.style.display = 'none';

  let totalDist = 0;
  for (let i = 1; i < stops.length; i++) {
    totalDist += parseInt(haversineKm(stops[i-1], stops[i]));
  }

  list.innerHTML = stops.map((stop, i) => {
    const color = colorForIndex(i);
    const dist = i > 0 ? `${haversineKm(stops[i-1], stop)} km from prev` : 'Start';
    return `
      <div class="stop-card" data-id="${stop.id}">
        <div class="stop-num" style="background:${color}22;border:2px solid ${color};color:${color}">${i+1}</div>
        <div class="stop-info">
          <div class="stop-name" title="${stop.name}">${stop.name}</div>
          <div class="stop-dist">${dist}</div>
        </div>
        <button class="stop-del" data-id="${stop.id}" title="Remove">×</button>
      </div>
    `;
  }).join('');

  if (stops.length > 1) {
    list.innerHTML += `<div style="text-align:center;font-size:11px;color:var(--muted);padding:12px 0;">
      Total route: ~${totalDist.toLocaleString()} km · ${stops.length} stops
    </div>`;
  }

  // Attach delete handlers
  list.querySelectorAll('.stop-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      removeStop(btn.dataset.id);
    });
  });

  // Click on card → pan map
  list.querySelectorAll('.stop-card').forEach((card, i) => {
    card.addEventListener('click', e => {
      if (e.target.classList.contains('stop-del')) return;
      map.setView([stops[i].lat, stops[i].lng], 8, { animate: true });
      markers.filter(m => m.getLatLng && m.getLatLng().lat === stops[i].lat).forEach(m => {
        try { m.openPopup(); } catch {}
      });
    });
  });

  // Drag to reorder
  if (window._sortable) window._sortable.destroy();
  window._sortable = Sortable.create(list, {
    animation: 150,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    handle: '.stop-card',
    filter: '.stop-del',
    onEnd(evt) {
      const moved = stops.splice(evt.oldIndex, 1)[0];
      stops.splice(evt.newIndex, 0, moved);
      saveOrder();
      renderMap();
    }
  });
}

// ── Search (Nominatim) ─────────────────────────────────────────────────
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

function showSearchLoading() {
  searchResults.innerHTML = '<div id="search-loading">Searching…</div>';
  searchResults.classList.add('open');
}
function hideSearch() { searchResults.classList.remove('open'); }

async function doSearch(query) {
  if (!query.trim()) { hideSearch(); return; }
  showSearchLoading();
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=6&addressdetails=1&viewbox=-25,-40,65,72&bounded=0`;
    const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();

    if (!data.length) {
      searchResults.innerHTML = '<div id="search-loading">No results found.</div>';
      return;
    }

    searchResults.innerHTML = data.map((place, i) => {
      const country = place.address?.country || '';
      const type    = place.type ? place.type.replace(/_/g,' ') : place.class;
      return `
        <div class="result-item" data-i="${i}" data-lat="${place.lat}" data-lng="${place.lon}" data-name="${place.display_name.split(',')[0]}">
          <span class="r-name">${place.display_name.split(',')[0]}</span>
          <span class="r-sub">${[type, country].filter(Boolean).join(' · ')}</span>
        </div>
      `;
    }).join('');
    searchResults.classList.add('open');

    searchResults.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        const name = el.dataset.name;
        const lat  = parseFloat(el.dataset.lat);
        const lng  = parseFloat(el.dataset.lng);
        addStop(name, lat, lng);
        searchInput.value = '';
        hideSearch();
        toast(`Added: ${name}`, 'ok');
      });
    });
  } catch (e) {
    searchResults.innerHTML = '<div id="search-loading">Search failed. Check your connection.</div>';
  }
}

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => doSearch(searchInput.value), 400);
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideSearch();
  if (e.key === 'Enter')  { clearTimeout(searchDebounce); doSearch(searchInput.value); }
});
document.getElementById('search-btn').addEventListener('click', () => {
  clearTimeout(searchDebounce); doSearch(searchInput.value);
});

// Hide results when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('search-section').contains(e.target)) hideSearch();
});

// ── Map click to add ───────────────────────────────────────────────────
map.on('dblclick', async e => {
  const { lat, lng } = e.latlng;
  try {
    const url  = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`;
    const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    const name = data.address?.city || data.address?.town || data.address?.village ||
                 data.address?.county || data.display_name?.split(',')[0] || `${lat.toFixed(3)}, ${lng.toFixed(3)}`;
    addStop(name, lat, lng);
    toast(`Added: ${name}`, 'ok');
  } catch {
    const name = `${lat.toFixed(3)}, ${lng.toFixed(3)}`;
    addStop(name, lat, lng);
    toast(`Added: ${name}`, 'ok');
  }
});

// ── Share ──────────────────────────────────────────────────────────────
document.getElementById('btn-share').addEventListener('click', () => {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    toast('Link copied to clipboard!', 'ok');
  }).catch(() => {
    prompt('Copy this link to share your trip:', url);
  });
});

// ── Export ─────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  toast('Opening print dialog — choose "Save as PDF" to export!', 'ok');
  setTimeout(() => window.print(), 800);
});

// ── Clear ──────────────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', clearAll);

// ── Toast ──────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ── Boot ───────────────────────────────────────────────────────────────
initTripId();
initFirebase();
if (!firebaseActive) loadLocal();
</script>
</body>
</html>
